name: triangle-scanner-daily

on:
  workflow_dispatch:
  schedule:
    # Weekdays 18:10 KST (09:10 UTC)
    - cron: '10 9 * * 1-5'

permissions:
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r triangle_scanner_webapp/requirements.txt
          pip install tabulate

      - name: Run daily report script
        run: |
          python triangle_scanner_webapp/scripts/daily_triangle_report.py \
            --market ALL \
            --top-n 30 \
            --max-tickers 1000 \
            --output-dir triangle_scanner_webapp/reports

      - name: Commit report artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add triangle_scanner_webapp/reports
          if git diff --cached --quiet; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "chore: update daily triangle scanner report"
          git push
