<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KRX 삼각수렴 대시보드</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #121a33;
      --panel-2: #1a2345;
      --text: #e9edff;
      --sub: #9aa8d8;
      --good: #39d98a;
      --warn: #ffb84d;
      --line: #2a376a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Pretendard, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, var(--bg), #080d1a 70%);
      color: var(--text);
    }

    .container { width: min(1120px, 94vw); margin: 28px auto 48px; }
    .title { margin: 0 0 8px; font-size: 30px; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { margin: 0 0 22px; color: var(--sub); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .label { color: var(--sub); font-size: 12px; margin-bottom: 8px; }
    .value { font-size: 22px; font-weight: 700; }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 12px;
      background: var(--panel-2);
      font-size: 12px;
      color: var(--sub);
      position: sticky;
      top: 0;
    }
    tbody td {
      padding: 12px;
      border-top: 1px solid rgba(42,55,106,0.5);
      font-size: 14px;
      white-space: nowrap;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    .ok { color: var(--good); font-weight: 700; }
    .bad { color: var(--warn); font-weight: 700; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 10px 0 14px;
      flex-wrap: wrap;
    }

    input[type="search"] {
      background: #0c1330;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 280px;
    }

    .links a {
      color: #b8c6ff;
      text-decoration: none;
      margin-left: 10px;
      font-size: 13px;
    }

    .empty {
      padding: 28px;
      color: var(--sub);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1 class="title">KRX 삼각수렴 데일리 대시보드</h1>
    <p class="subtitle">매일 자동 생성된 삼각수렴 후보 종목을 웹에서 바로 확인합니다.</p>

    <section class="cards">
      <article class="card"><div class="label">생성 시각 (KST)</div><div id="time-kst" class="value">-</div></article>
      <article class="card"><div class="label">시장</div><div id="market" class="value">-</div></article>
      <article class="card"><div class="label">후보 수</div><div id="count" class="value">-</div></article>
      <article class="card"><div class="label">스캔 상태</div><div id="status" class="value">-</div></article>
    </section>

    <div class="toolbar">
      <input id="search" type="search" placeholder="종목명/티커 검색" />
      <div class="links">
        <a href="./data/latest_candidates.csv">CSV 다운로드</a>
        <a href="./data/latest_candidates.json">JSON</a>
        <a href="./data/latest_metadata.json">메타데이터</a>
      </div>
    </div>

    <section class="panel">
      <div style="overflow:auto; max-height: 70vh;">
        <table>
          <thead>
            <tr>
              <th>티커</th>
              <th>종목명</th>
              <th>점수</th>
              <th>현재가</th>
              <th>Apex까지(일)</th>
              <th>상단/하단 접촉</th>
              <th>R²(상/하)</th>
              <th>끝 폭 비율</th>
              <th>거래량 수축</th>
              <th>기준일</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div id="empty" class="empty" hidden>조건에 맞는 후보가 없습니다.</div>
    </section>
  </main>

  <script>
    const rowsEl = document.getElementById('rows');
    const emptyEl = document.getElementById('empty');
    const searchEl = document.getElementById('search');

    let allRows = [];

    const number = (v, d = 2) => Number(v ?? 0).toLocaleString('ko-KR', { maximumFractionDigits: d });

    function render(rows) {
      rowsEl.innerHTML = rows.map(r => `
        <tr>
          <td>${r.ticker ?? '-'}</td>
          <td>${r.name ?? '-'}</td>
          <td>${number(r.score, 2)}</td>
          <td>${number(r.close, 2)}</td>
          <td>${number(r.days_to_apex, 2)}</td>
          <td>${r.touch_highs ?? '-'} / ${r.touch_lows ?? '-'}</td>
          <td>${number(r.upper_r2, 3)} / ${number(r.lower_r2, 3)}</td>
          <td>${number(r.end_width_ratio, 3)}</td>
          <td class="${r.volume_contracting ? 'ok' : 'bad'}">${r.volume_contracting ? 'Y' : 'N'}</td>
          <td>${r.last_date ?? '-'}</td>
        </tr>
      `).join('');

      const isEmpty = rows.length === 0;
      emptyEl.hidden = !isEmpty;
    }

    function applyFilter() {
      const q = searchEl.value.trim().toLowerCase();
      if (!q) return render(allRows);
      const filtered = allRows.filter(r =>
        String(r.ticker ?? '').toLowerCase().includes(q) ||
        String(r.name ?? '').toLowerCase().includes(q)
      );
      render(filtered);
    }

    async function load() {
      try {
        const [metaRes, dataRes] = await Promise.all([
          fetch('./data/latest_metadata.json', { cache: 'no-store' }),
          fetch('./data/latest_candidates.json', { cache: 'no-store' }),
        ]);

        if (!metaRes.ok || !dataRes.ok) throw new Error('리포트 파일 로드 실패');

        const meta = await metaRes.json();
        const data = await dataRes.json();
        allRows = Array.isArray(data) ? data : [];

        document.getElementById('time-kst').textContent = meta.generated_at_kst ?? '-';
        document.getElementById('market').textContent = meta.market ?? '-';
        document.getElementById('count').textContent = String(meta.count ?? allRows.length);

        const statusEl = document.getElementById('status');
        if (meta.scan_error) {
          statusEl.textContent = '경고';
          statusEl.className = 'value bad';
          statusEl.title = meta.scan_error;
        } else {
          statusEl.textContent = '정상';
          statusEl.className = 'value ok';
        }

        render(allRows);
      } catch (e) {
        console.error(e);
        document.getElementById('status').textContent = '오류';
        emptyEl.hidden = false;
        emptyEl.textContent = '데이터를 불러오지 못했습니다. workflow 실행 후 다시 확인하세요.';
      }
    }

    searchEl.addEventListener('input', applyFilter);
    load();
  </script>
</body>
</html>
